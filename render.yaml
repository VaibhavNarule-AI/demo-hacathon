services:
  - type: web
    name: demo-hacathon
    runtime: python
    rootDir: app
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
