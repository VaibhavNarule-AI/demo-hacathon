# Local-cluster manifest (Docker Desktop Kubernetes / kind / minikube with the
# image loaded into the node). imagePullPolicy: Never means the image must
# already exist locally -- devops/deploy.sh builds it with `docker build`
# right before `kubectl apply -f k8s/`.
#
# /data uses a hostPath, but on a minikube docker-driver cluster the node is
# itself a container with its own filesystem -- this hostPath is NOT the same
# file as docker-compose's ./data, even though the path string looks like a
# Mac path. The pod's SQLite file is its own, isolated copy. It must be seeded
# separately: `kubectl exec deploy/soc-dashboard -- python seed.py` (see
# devops/deploy.sh, which does this after the pod is ready). logs/testcases
# inside the pod are similarly ephemeral. docker-compose is the primary demo
# (host-visible logs/testcases); this manifest is the "yes, this also runs on
# k8s" proof.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-dashboard
  labels:
    app: soc-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soc-dashboard
  template:
    metadata:
      labels:
        app: soc-dashboard
    spec:
      containers:
        - name: soc-dashboard
          image: pulsesoc:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_PATH
              value: /data/app.db
          volumeMounts:
            - name: soc-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: soc-data
          hostPath:
            path: /Users/vaibhav.narule@gruve.ai/Library/CloudStorage/OneDrive-GruveAI/git/hackathon-final/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: soc-dashboard
spec:
  type: NodePort
  selector:
    app: soc-dashboard
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080
