apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-hacathon
  labels:
    app: demo-hacathon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-hacathon
  template:
    metadata:
      labels:
        app: demo-hacathon
    spec:
      containers:
        - name: demo-hacathon
          image: swegdev.azurecr.io/demo-hacathon:latest
          ports:
            - containerPort: 8501
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-hacathon-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
